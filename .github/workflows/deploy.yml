name: Deploy to Virtualmin

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build Next.js
        env:
          # Provide a placeholder DATABASE_URL so the build can type-check
          # Prisma queries without needing a real database connection.
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          AUTH_SECRET: "ci-build-placeholder-secret"
        run: npm run build

      - name: Deploy to Virtualmin via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          source: ".,!.env,!.git,!.github,!.next/cache,node_modules/@prisma,prisma"
          target: "${{ secrets.VM_PATH }}"
          strip_components: 0
          overwrite: true

      - name: Setup server and restart app via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            # --- Install Node.js 20 if not present ---
            if ! command -v node &> /dev/null || [[ "$(node -v)" != v20* ]]; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo bash -
              sudo apt-get install -y nodejs
            fi

            # --- Install PM2 globally if not present ---
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
              pm2 startup | tail -1 | bash || true
            fi

            # --- Write .env if secrets are provided ---
            if [ -n "${{ secrets.VM_DATABASE_URL }}" ]; then
              cat > ${{ secrets.VM_PATH }}/.env <<'ENVEOF'
            DATABASE_URL="${{ secrets.VM_DATABASE_URL }}"
            NEXTAUTH_URL="${{ secrets.VM_NEXTAUTH_URL }}"
            NEXTAUTH_SECRET="${{ secrets.VM_NEXTAUTH_SECRET }}"
            UPLOADTHING_TOKEN="${{ secrets.VM_UPLOADTHING_TOKEN }}"
            ENVEOF
            fi

            # --- Install deps, migrate, start app ---
            cd ${{ secrets.VM_PATH }}
            npm install --production
            npx prisma generate
            npx prisma migrate deploy
            mkdir -p logs
            pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            pm2 save

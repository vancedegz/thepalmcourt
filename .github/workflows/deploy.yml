name: Deploy to Virtualmin

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build Next.js
        env:
          # Provide a placeholder DATABASE_URL so the build can type-check
          # Prisma queries without needing a real database connection.
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          AUTH_SECRET: "ci-build-placeholder-secret"
        run: npm run build

      - name: Deploy to Virtualmin via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: ".,!.env,!.git,!.github,!.next/cache,node_modules/@prisma,prisma"
          target: "${{ secrets.VM_PATH }}"
          rm: true
          strip_components: 0

      - name: Restart app via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ${{ secrets.VM_PATH }}
            npm install --production
            npx prisma generate
            npx prisma migrate deploy
            pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js

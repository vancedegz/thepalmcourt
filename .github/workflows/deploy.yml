name: Deploy to Virtualmin

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build Next.js
        env:
          # Provide a placeholder DATABASE_URL so the build can type-check
          # Prisma queries without needing a real database connection.
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          AUTH_SECRET: "ci-build-placeholder-secret"
        run: npm run build

      - name: Copy static assets into standalone
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Deploy to Virtualmin via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          source: ".,!.env,!.git,!.github,!.next/cache,!node_modules,node_modules/@prisma,prisma"
          target: "${{ secrets.VM_PATH }}"
          strip_components: 0
          overwrite: true

      - name: Setup server and restart app via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script_stop: true
          script: |
            # --- Install PM2 globally if not present ---
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2 || true
            fi
            # --- Write .env ---
            printf 'DATABASE_URL="%s"\nNEXTAUTH_URL="%s"\nNEXTAUTH_SECRET="%s"\nAUTH_SECRET="%s"\nAUTH_TRUST_HOST="true"\nUPLOADTHING_TOKEN="%s"\n' \
              '${{ secrets.DATABASE_URL }}' \
              '${{ secrets.VM_NEXTAUTH_URL }}' \
              '${{ secrets.VM_NEXTAUTH_SECRET }}' \
              '${{ secrets.VM_NEXTAUTH_SECRET }}' \
              '${{ secrets.UPLOADTHING_TOKEN }}' \
              > ${{ secrets.VM_PATH }}/.env
            # --- Install deps, migrate, start app ---
            cd ${{ secrets.VM_PATH }}
            npm install --omit=dev
            npx prisma generate
            npx prisma migrate deploy
            npm install tsx
            npx tsx prisma/seed.ts
            mkdir -p logs
            export DATABASE_URL="${{ secrets.DATABASE_URL }}"
            export AUTH_SECRET="${{ secrets.VM_NEXTAUTH_SECRET }}"
            export NEXTAUTH_SECRET="${{ secrets.VM_NEXTAUTH_SECRET }}"
            export NEXTAUTH_URL="${{ secrets.VM_NEXTAUTH_URL }}"
            export UPLOADTHING_TOKEN="${{ secrets.UPLOADTHING_TOKEN }}"
            pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
            pm2 save

name: Deploy to Virtualmin

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Deploy source to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          source: ".,!.env,!.git,!.github,!.next,!node_modules"
          target: "${{ secrets.VM_PATH }}"
          strip_components: 0
          overwrite: true

      - name: Build and restart app on server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          command_timeout: 30m
          script_stop: true
          script: |
            # --- Install PM2 if not present ---
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2 || true
            fi
            # --- Write .env ---
            printf 'DATABASE_URL="%s"\nNEXTAUTH_URL="%s"\nNEXTAUTH_SECRET="%s"\nAUTH_SECRET="%s"\nAUTH_TRUST_HOST="true"\nUPLOADTHING_TOKEN="%s"\n' \
              '${{ secrets.DATABASE_URL }}' \
              '${{ secrets.VM_NEXTAUTH_URL }}' \
              '${{ secrets.VM_NEXTAUTH_SECRET }}' \
              '${{ secrets.VM_NEXTAUTH_SECRET }}' \
              '${{ secrets.UPLOADTHING_TOKEN }}' \
              > ${{ secrets.VM_PATH }}/.env
            cd ${{ secrets.VM_PATH }}
            # --- Clear previous build to avoid permission/corruption issues ---
            sudo rm -rf .next 2>/dev/null || rm -rf .next || true
            # --- Install all deps (including devDeps for build) ---
            npm install
            # --- Build on server so Prisma client matches ---
            DATABASE_URL="${{ secrets.DATABASE_URL }}" AUTH_SECRET="${{ secrets.VM_NEXTAUTH_SECRET }}" npm run build
            # --- Copy assets into standalone ---
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public
            # --- Migrate DB ---
            npx prisma migrate deploy
            mkdir -p logs
            # --- Restart app ---
            fuser -k 3001/tcp 2>/dev/null || true
            pm2 delete pickleball-courts 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save
